{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2>📝 Регистрация</h2>
        <form method="post">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" name="username" placeholder="Придумайте имя пользователя" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Придумайте пароль" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Подтверждение пароля</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Повторите пароль" required>
            </div>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center;">
            Уже есть аккаунт? <a href="{{ url_for('login') }}" class="link-text">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
